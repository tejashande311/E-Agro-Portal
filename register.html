<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Agro Portal</title>
    <link rel="stylesheet" href="design.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2><i class="fas fa-hand-holding-heart"></i> Register as Farmer</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="e.g., Rajesh Kumar" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="farmer@example.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Create password" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Village/District</label>
                    <input type="text" id="regLocation" placeholder="e.g., Sangli, Maharashtra" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Mobile Number</label>
                    <input type="tel" id="regMobile" placeholder="9876543210" required>
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-user-check"></i> Register</button>
                <div id="regMessage" class="message"></div>
            </form>
            <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

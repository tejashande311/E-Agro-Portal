<!-- products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - E-Agro Portal</title>
    <link rel="stylesheet" href="design.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="products-page">
        <header class="product-header">
            <h1><i class="fas fa-seedling"></i> Our Fresh Harvest</h1>
            <p> Farm to Table</p>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i> <span id="userName">Farmer</span>
                <button id="logoutBtn" class="logout-small"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </header>

        <!-- Farming Process Guide -->
        <div class="farming-process">
            <h3><i class="fas fa-tractor"></i> Farming Journey: From Planting to Harvesting</h3>
            <div class="process-steps">
                <div class="step"><i class="fas fa-seedling"></i> 1. Land Preparation</div>
                <div class="step"><i class="fas fa-leaf"></i> 2. Sowing Seeds</div>
                <div class="step"><i class="fas fa-hand-holding-water"></i> 3. Irrigation</div>
                <div class="step"><i class="fas fa-bug"></i> 4. Fertilizers & Care</div>
                <div class="step"><i class="fas fa-sun"></i> 5. Crop Growth</div>
                <div class="step"><i class="fas fa-hand-peace"></i> 6. Harvesting</div>
                <div class="step"><i class="fas fa-truck"></i> 7. Transport to Market</div>
                <div class="step"><i class="fas fa-chart-line"></i> 8. Sell at Best Price</div>
            </div>
            <div class="market-link">
                <a href="https://www.investing.com/commodities/" target="_blank" class="market-btn">
                    <i class="fas fa-chart-simple"></i> Check Live Market Prices (Commodity Rates)
                </a>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="product-grid" id="productGrid">
            <!-- Products will be loaded by JavaScript -->
        </div>
    </div>

    <!-- Product Info Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalImg" class="modal-img"></div>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <p id="modalPrice" class="modal-price"></p>
            <p id="modalOrigin"><i class="fas fa-map-marker-alt"></i> <span></span></p>
            <button id="closeModalBtn" class="btn-primary">Close</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

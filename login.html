<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Agro Portal</title>
    <link rel="stylesheet" href="design.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="farmer@example.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
                <div id="loginMessage" class="message"></div>
            </form>
            <p class="auth-switch">New farmer? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
